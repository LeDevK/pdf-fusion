function initEventListeners(){
  // Language
  document.querySelectorAll('.lang-btn[data-lang]').forEach(btn=>btn.addEventListener('click',()=>setLang(btn.dataset.lang)));
  // Theme + caps
  document.getElementById('themeBtn').addEventListener('click',toggleTheme);
  document.getElementById('capsHeader').addEventListener('click',toggleCaps);
  // Cancel button
  document.getElementById('cancelBtn').addEventListener('click',()=>{
    if(!isProcessing)return;
    _finishProcessing();hide('progressWrap');
  });
  // Mode tabs
  document.querySelectorAll('.mode-tab[data-mode]').forEach(btn=>btn.addEventListener('click',()=>setMode(btn.dataset.mode)));
  // HTML templates
  document.querySelectorAll('[data-tpl]').forEach(btn=>btn.addEventListener('click',()=>loadHtmlTemplate(btn.dataset.tpl)));
  // Page editor
  document.getElementById('btnSelectAll').addEventListener('click',selectAllPages);
  document.getElementById('btnSelectNone').addEventListener('click',selectNonePages);
  document.getElementById('btnRotate90').addEventListener('click',()=>rotateSelected(90));
  document.getElementById('btnRotateMinus90').addEventListener('click',()=>rotateSelected(-90));
  document.getElementById('btnDelete').addEventListener('click',deleteSelected);
  // Compression
  document.getElementById('compRange').addEventListener('input',updateCompUI);
  // Watermark
  document.getElementById('wmText').addEventListener('input',debouncedUpdateWmPreview);
  document.getElementById('wmOpacity').addEventListener('input',function(){document.getElementById('wmOpacityVal').textContent=this.value+'%';debouncedUpdateWmPreview();});
  document.getElementById('wmSize').addEventListener('input',function(){document.getElementById('wmSizeVal').textContent=this.value;debouncedUpdateWmPreview();});
  // Crop
  document.getElementById('cropPageNum').addEventListener('input',loadCropPage);
  document.getElementById('cropPrevBtn').addEventListener('click',cropPrevPage);
  document.getElementById('cropNextBtn').addEventListener('click',cropNextPage);
  document.getElementById('cropResetBtn').addEventListener('click',resetCropRect);
  // Redact
  document.getElementById('redactPageNum').addEventListener('input',loadRedactPage);
  document.getElementById('redactPrevBtn').addEventListener('click',redactPrevPage);
  document.getElementById('redactNextBtn').addEventListener('click',redactNextPage);
  document.getElementById('redactClearBtn').addEventListener('click',clearRedactZones);
  // Protect
  document.getElementById('pwdInput').addEventListener('input',updatePwdStrength);
  document.getElementById('pwdVisBtn').addEventListener('click',()=>togglePwdVis('pwdInput'));
  document.getElementById('pwdConfirmVisBtn').addEventListener('click',()=>togglePwdVis('pwdConfirm'));
  document.getElementById('pepperModeManual').addEventListener('click',()=>setPepperMode('manual'));
  document.getElementById('pepperModeAuto').addEventListener('click',()=>setPepperMode('auto'));
  document.getElementById('pepperManual').addEventListener('input',updatePepperPreview);
  document.getElementById('pepperGenBtn').addEventListener('click',generatePepper);
  // OCR
  // OCR language toggle
  document.getElementById('ocrLangGroup').addEventListener('click',e=>{
    const btn=e.target.closest('[data-lang]');
    if(!btn)return;
    const lang=btn.dataset.lang;
    if(ocrLangs.has(lang)){
      if(ocrLangs.size<=1)return; // keep at least one language selected
      ocrLangs.delete(lang);
      btn.classList.remove('sel-blue');
    }else{
      ocrLangs.add(lang);
      btn.classList.add('sel-blue');
    }
  });
  document.getElementById('ocrCopyBtn').addEventListener('click',copyOcrText);
  document.getElementById('ocrSaveBtn').addEventListener('click',saveOcrAsTxt);
  document.getElementById('ocrSavePdfBtn').addEventListener('click',saveOcrAsPdf);
  // Main actions
  document.getElementById('actionBtn').addEventListener('click',runAction);
  document.getElementById('clearAllBtn').addEventListener('click',clearAll);
  // File list: delegation for remove buttons
  document.getElementById('fileList').addEventListener('click',function(e){
    const btn=e.target.closest('button.file-remove[data-idx]');
    if(btn)removeFile(parseInt(btn.dataset.idx,10));
  });
  // Dynamic option groups: event delegation
  document.getElementById('pageSizeGroup').addEventListener('click',e=>{const b=e.target.closest('[data-sz]');if(b)setImgOpt('sz',b.dataset.sz);});
  document.getElementById('fitGroup').addEventListener('click',e=>{const b=e.target.closest('[data-fit]');if(b)setImgOpt('fit',b.dataset.fit);});
  document.getElementById('txtFontSizeGroup').addEventListener('click',e=>{const b=e.target.closest('[data-fs]');if(b)setTxtOpt('fs',b.dataset.fs);});
  document.getElementById('txtPageSzGroup').addEventListener('click',e=>{const b=e.target.closest('[data-ps]');if(b)setTxtOpt('ps',b.dataset.ps);});
  document.getElementById('txtMgGroup').addEventListener('click',e=>{const b=e.target.closest('[data-mg]');if(b)setTxtOpt('mg',b.dataset.mg);});
  document.getElementById('htmlPageSzGroup').addEventListener('click',e=>{const b=e.target.closest('[data-ps]');if(b)setHtmlOpt('ps',b.dataset.ps);});
  document.getElementById('htmlMgGroup').addEventListener('click',e=>{const b=e.target.closest('[data-mg]');if(b)setHtmlOpt('mg',b.dataset.mg);});
  document.getElementById('wmPosGroup').addEventListener('click',e=>{const b=e.target.closest('[data-pos]');if(b)setWmPos(b.dataset.pos);});
  document.getElementById('encAlgoGroup').addEventListener('click',e=>{const b=e.target.closest('[data-algo]');if(b)setAlgo(b.dataset.algo);});
  document.getElementById('splitModeGroup').addEventListener('click',e=>{const b=e.target.closest('[data-mode]');if(b)setSplitMode(b.dataset.mode);});
  document.getElementById('cropApplyGroup').addEventListener('click',e=>{const b=e.target.closest('[data-apply]');if(b)setCropApply(b.dataset.apply);});
  document.getElementById('redactZonesList').addEventListener('click',e=>{const b=e.target.closest('button[data-idx]');if(b)removeRedactZone(parseInt(b.dataset.idx,10));});
  // Modal
  const overlay=document.getElementById('modalOverlay');
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  document.getElementById('modalBox').addEventListener('click',e=>e.stopPropagation());
  document.getElementById('modalClose').addEventListener('click',closeModal);
  // Clear sensitive data on tab close
  window.addEventListener('beforeunload',clearSensitiveData);
}

window.addEventListener('unhandledrejection',e=>{
  console.error('[PDF Fusion] Unhandled rejection:',e.reason);
  e.preventDefault();
  if(isProcessing){ isProcessing=false; document.getElementById('actionBtn').disabled=false; }
  fail(e.reason instanceof Error?e.reason:new Error(String(e.reason||'Erreur inattendue')));
});
currentLang=detectLang();
setLang(currentLang);
loadHtmlTemplate('basic');
renderHtmlOptions();
initEventListeners();
</script>
