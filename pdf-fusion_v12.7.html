<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'; form-action 'none';">
<title>PDF Fusion by ALTEN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js" integrity="sha512-z8IYLHO8bTgFqj+yrPyIJnzBDf7DDhWwiEsk4sY+Oe6J2M+WQequeGS7qioI5vT6rXgVRb4K1UVQC5ER7MKzKQ==" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha512-q+4liFwdPC/bNdhUpZx6aXDx/h77yEQtn4I1slHydcbZK34nLaR3cAeYSJshoxIOq3mjEf7xJE8YWIUHMn+oCQ==" crossorigin="anonymous"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --accent:#e8ff47; --accent-dim:rgba(232,255,71,0.12);
  --blue:#47c8ff;   --blue-dim:rgba(71,200,255,0.10);
  --green:#47ffaa;  --green-dim:rgba(71,255,170,0.10);
  --purple:#b47fff; --purple-dim:rgba(180,127,255,0.10);
  --orange:#ffaa47; --orange-dim:rgba(255,170,71,0.10);
  --pink:#ff6b9d;   --pink-dim:rgba(255,107,157,0.10);
  --teal:#47ffd4;   --teal-dim:rgba(71,255,212,0.10);
  --red:#ff4747;    --red-dim:rgba(255,71,71,0.10);
}
[data-theme="dark"]{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;--border:#2e2e2e;--text:#f0f0f0;--text2:#aaa;--muted:#555;--shadow:rgba(0,0,0,.5);}
[data-theme="light"]{--bg:#f4f4f0;--surface:#fff;--surface2:#f0f0ec;--surface3:#e4e4e0;--border:#ddddd8;--text:#111;--text2:#555;--muted:#999;--shadow:rgba(0,0,0,.12);}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 80px;transition:background .3s,color .3s;}

/* TOP BAR */
.top-bar{position:fixed;top:14px;right:16px;display:flex;gap:8px;z-index:200;align-items:center;}
.lang-bar{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:0 2px 12px var(--shadow);}
.lang-btn{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;cursor:pointer;padding:4px 7px;border-radius:6px;transition:all .15s;}
.lang-btn:hover{color:var(--text);background:var(--surface2);}
.lang-btn.active{background:var(--accent);color:#000;font-weight:700;}
.theme-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 10px;cursor:pointer;font-size:1rem;transition:all .2s;line-height:1;box-shadow:0 2px 12px var(--shadow);}
.theme-btn:hover{border-color:var(--accent);}

/* HEADER */
header{text-align:center;margin-bottom:32px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2.6rem;letter-spacing:-.03em;color:var(--accent);line-height:1;}
.logo span{color:var(--text);}
.subtitle{font-size:.92rem;color:var(--muted);margin-top:6px;font-weight:300;}

.container{width:100%;max-width:780px;display:flex;flex-direction:column;gap:14px;}

/* CAPS */
.caps-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.caps-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s;}
.caps-panel.open .caps-header{border-bottom-color:var(--border);}
.caps-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--text);}
.caps-chevron{color:var(--muted);font-size:.72rem;transition:transform .25s;}
.caps-panel.open .caps-chevron{transform:rotate(180deg);}
.caps-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s;padding:0 16px;}
.caps-panel.open .caps-body{max-height:800px;padding:14px 16px;}
.cap-item{display:flex;gap:9px;align-items:flex-start;padding:10px 12px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);}
.cap-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.cap-label{font-size:.8rem;color:var(--text);font-weight:500;line-height:1.4;}
.cap-desc{font-size:.73rem;color:var(--muted);margin-top:2px;line-height:1.4;}

/* TABS */
.mode-tabs{display:flex;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px;flex-wrap:wrap;}
.mode-tab{flex:1;min-width:90px;padding:8px 6px;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted);background:none;display:flex;align-items:center;justify-content:center;gap:5px;}
.mode-tab:hover{color:var(--text);background:var(--surface2);}
.t-pdf    {background:var(--accent-dim)   !important;color:var(--accent)   !important;border:1px solid rgba(232,255,71,.25)  !important;}
.t-img    {background:var(--blue-dim)     !important;color:var(--blue)     !important;border:1px solid rgba(71,200,255,.25) !important;}
.t-pages  {background:var(--green-dim)    !important;color:var(--green)    !important;border:1px solid rgba(71,255,170,.25) !important;}
.t-wm     {background:var(--purple-dim)   !important;color:var(--purple)   !important;border:1px solid rgba(180,127,255,.25)!important;}
.t-protect{background:var(--orange-dim)   !important;color:var(--orange)   !important;border:1px solid rgba(255,170,71,.25) !important;}
.t-txt    {background:var(--teal-dim)     !important;color:var(--teal)     !important;border:1px solid rgba(71,255,212,.25) !important;}
.t-split  {background:var(--pink-dim)     !important;color:var(--pink)     !important;border:1px solid rgba(255,107,157,.25)!important;}
  .t-crop   {background:rgba(71,212,255,0.12) !important;color:#47d4ff         !important;border:1px solid rgba(71,212,255,.25) !important;}
  .t-redact {background:rgba(60,60,60,0.5)    !important;color:#ccc            !important;border:1px solid rgba(150,150,150,.3) !important;}
.t-html   {background:var(--blue-dim)     !important;color:var(--blue)     !important;border:1px solid rgba(71,200,255,.25) !important;}
.t-ocr    {background:var(--purple-dim)   !important;color:var(--purple)   !important;border:1px solid rgba(180,127,255,.25)!important;}

/* DROPZONE */
.dropzone{border:2px dashed var(--border);border-radius:16px;padding:36px 24px;text-align:center;cursor:pointer;transition:all .25s;background:var(--surface);position:relative;}
.dropzone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dropzone.dz-pdf:hover,.dropzone.dz-pdf.drag-over{border-color:var(--accent);background:var(--accent-dim);}
.dropzone.dz-img:hover,.dropzone.dz-img.drag-over{border-color:var(--blue);background:var(--blue-dim);}
.dropzone.dz-pages:hover,.dropzone.dz-pages.drag-over{border-color:var(--green);background:var(--green-dim);}
.dropzone.dz-wm:hover,.dropzone.dz-wm.drag-over{border-color:var(--purple);background:var(--purple-dim);}
.dropzone.dz-protect:hover,.dropzone.dz-protect.drag-over{border-color:var(--orange);background:var(--orange-dim);}
.dropzone.dz-txt:hover,.dropzone.dz-txt.drag-over{border-color:var(--teal);background:var(--teal-dim);}
.dropzone.dz-split:hover,.dropzone.dz-split.drag-over{border-color:var(--pink);background:var(--pink-dim);}
.dropzone.dz-html:hover,.dropzone.dz-html.drag-over{border-color:var(--blue);background:var(--blue-dim);}
.dropzone.dz-ocr:hover,.dropzone.dz-ocr.drag-over{border-color:var(--purple);background:var(--purple-dim);}
.drop-icon{font-size:2.2rem;margin-bottom:8px;display:block;}
.drop-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:600;color:var(--text);margin-bottom:4px;}
.drop-hint{font-size:.82rem;color:var(--muted);}

/* FILE LIST */
.file-list{display:flex;flex-direction:column;gap:7px;}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 13px;display:flex;align-items:center;gap:10px;cursor:grab;transition:all .2s;user-select:none;}
.file-item:hover{border-color:var(--surface3);background:var(--surface2);}
.file-item.dragging{opacity:.4;}
.file-item.drag-target{border-color:var(--accent);background:var(--accent-dim);}
.file-thumb{width:36px;height:36px;border-radius:7px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);}
.file-icon{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;font-family:'Syne',sans-serif;}
.fi-pdf{background:var(--accent-dim);color:var(--accent);}
.fi-img{background:var(--blue-dim);color:var(--blue);}
.fi-txt{background:var(--teal-dim);color:var(--teal);}
.fi-htm{background:var(--blue-dim);color:var(--blue);}
.file-info{flex:1;min-width:0;}
.file-name{font-size:.86rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.file-meta{font-size:.73rem;color:var(--muted);margin-top:2px;}
.file-handle{color:var(--muted);font-size:1rem;cursor:grab;padding:3px;}
.file-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;padding:4px 7px;border-radius:6px;transition:all .15s;line-height:1;}
.file-remove:hover{color:var(--red);background:var(--red-dim);}
.order-badge{width:20px;height:20px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);font-size:.68rem;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Syne',sans-serif;}
.pdf-preview-thumb{width:36px;height:36px;border-radius:7px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;}
.pdf-preview-thumb canvas{width:100%;height:100%;object-fit:cover;}

/* PAGE EDITOR */
.page-editor{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:none;}
.page-editor.visible{display:block;}
.page-editor-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.page-editor-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--text);}
.page-editor-actions{display:flex;gap:6px;flex-wrap:wrap;}
.page-action-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:.75rem;font-family:'DM Sans',sans-serif;color:var(--text2);cursor:pointer;transition:all .15s;}
.page-action-btn:hover{border-color:var(--accent);color:var(--text);}
.page-action-btn.danger:hover{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.pages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;padding:14px;max-height:450px;overflow-y:auto;}
.pages-grid::-webkit-scrollbar{width:5px;}
.pages-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.page-card{border-radius:10px;overflow:hidden;border:2px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;position:relative;user-select:none;}
.page-card:hover{border-color:var(--surface3);}
.page-card.selected{border-color:var(--green);background:var(--green-dim);}
.page-card.page-dragging{opacity:.35;}
.page-card.page-drag-over{border-color:var(--accent);}
.page-canvas-wrap{width:100%;aspect-ratio:.707;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#fff;}
.page-canvas-wrap canvas{max-width:100%;max-height:100%;display:block;}
.page-footer{padding:4px 7px;display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.page-num{font-size:.65rem;color:var(--muted);font-family:'Syne',sans-serif;font-weight:600;}
.page-rotate-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.8rem;padding:2px 4px;border-radius:4px;transition:all .15s;line-height:1;}
.page-rotate-btn:hover{color:var(--text);background:var(--surface3);}
.page-selected-badge{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:var(--green);display:none;align-items:center;justify-content:center;font-size:.6rem;color:#000;font-weight:700;}
.page-card.selected .page-selected-badge{display:flex;}

/* PANELS */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:none;flex-direction:column;gap:12px;}
.panel.visible{display:flex;}
.panel-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.panel-label{font-size:.8rem;color:var(--muted);font-weight:500;min-width:100px;}
.opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 11px;font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--muted);cursor:pointer;transition:all .15s;}
.opt-btn:hover{color:var(--text);border-color:var(--surface3);}
.opt-btn.sel{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,255,71,.4);}
.opt-btn.sel-blue{background:var(--blue-dim);color:var(--blue);border-color:rgba(71,200,255,.4);}
.opt-btn.sel-green{background:var(--green-dim);color:var(--green);border-color:rgba(71,255,170,.4);}
.opt-btn.sel-purple{background:var(--purple-dim);color:var(--purple);border-color:rgba(180,127,255,.4);}
.opt-btn.sel-orange{background:var(--orange-dim);color:var(--orange);border-color:rgba(255,170,71,.4);}
.opt-btn.sel-teal{background:var(--teal-dim);color:var(--teal);border-color:rgba(71,255,212,.4);}
.opt-btn.sel-pink{background:var(--pink-dim);color:var(--pink);border-color:rgba(255,107,157,.4);}
.text-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.text-input:focus{border-color:var(--accent);}
.text-input::placeholder{color:var(--muted);}
.text-input.wide{flex:1;min-width:160px;}
.range-wrap{display:flex;align-items:center;gap:10px;flex:1;}
input[type="range"]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--surface3);outline:none;cursor:pointer;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}
.range-val{font-size:.78rem;color:var(--text);font-family:'Syne',sans-serif;font-weight:600;min-width:32px;}
.color-swatch{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-swatch.active{border-color:var(--text);transform:scale(1.15);}
.info-box{font-size:.73rem;color:var(--muted);line-height:1.5;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;}

/* HTML editor */
.html-editor{width:100%;min-height:200px;max-height:360px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:monospace;font-size:.8rem;outline:none;resize:vertical;transition:border-color .2s;}
.html-editor:focus{border-color:var(--blue);}

/* SPLIT options */
.split-mode-desc{font-size:.75rem;color:var(--muted);line-height:1.5;padding:4px 0;}

/* OCR output */
.ocr-result{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:.82rem;color:var(--text);line-height:1.6;max-height:300px;overflow-y:auto;white-space:pre-wrap;display:none;}
.ocr-result.visible{display:block;}
.ocr-actions{display:flex;gap:8px;flex-wrap:wrap;}
.ocr-copy-btn{background:var(--purple-dim);border:1px solid rgba(180,127,255,.3);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.8rem;color:var(--purple);font-family:'DM Sans',sans-serif;}
.ocr-save-btn{background:var(--green-dim);border:1px solid rgba(71,255,170,.3);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.8rem;color:var(--green);font-family:'DM Sans',sans-serif;}

/* OPTIONS BAR */
.options-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.options-label{font-size:.8rem;color:var(--muted);font-weight:500;}
.ext-badge{font-size:.8rem;color:var(--accent);font-weight:600;flex-shrink:0;}

/* INFO */
.info-row{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);padding:0 4px;}
.drag-hint{font-size:.73rem;color:var(--muted);text-align:center;padding:2px 0;}

/* COMP */
.comp-meter{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:8px;padding:8px 12px;font-size:.78rem;}
.comp-bar-bg{flex:1;height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;}
.comp-bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s;}

/* PROGRESS */
.progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:none;}
.progress-wrap.visible{display:block;}
.progress-top{display:flex;justify-content:space-between;margin-bottom:9px;font-size:.82rem;}
.progress-bar-bg{background:var(--surface2);border-radius:99px;height:5px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:99px;width:0%;transition:width .3s;}

/* SUCCESS */
.success-banner{background:rgba(232,255,71,.07);border:1px solid rgba(232,255,71,.25);border-radius:12px;padding:14px;display:none;align-items:center;gap:10px;font-size:.88rem;color:var(--accent);}
.success-banner.visible{display:flex;}

/* ACTIONS */
.actions{display:flex;gap:10px;}
.btn-main{flex:1;border:none;border-radius:12px;padding:14px 22px;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em;color:#000;}
.btn-main:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.2);}
.btn-main:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.bm-pdf{background:var(--accent);}
.bm-img{background:var(--blue);}
.bm-pages{background:var(--green);}
.bm-wm{background:var(--purple);}
.bm-protect{background:var(--orange);}
.bm-txt{background:var(--teal);}
.bm-split{background:var(--pink);}
.bm-html{background:var(--blue);}
.bm-ocr{background:var(--purple);}
.bm-crop{background:#47d4ff;}
.bm-redact{background:#888;}
.btn-clear{background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;font-size:.9rem;}
.btn-clear:hover{color:var(--red);border-color:rgba(255,71,71,.3);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.visible{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;gap:12px;}
.modal-box canvas{max-width:70vw;max-height:70vh;border-radius:8px;}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 16px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);align-self:flex-end;}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.file-item,.page-card{animation:fadeIn .18s ease;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="lang-bar">
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="de">DE</button>
    <button class="lang-btn" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn" data-lang="es">ES</button>
  </div>
  <button class="theme-btn" id="themeBtn">🌙</button>
</div>

<header>
  <div class="logo">PDF<span>Fusion</span></div>
  <p class="subtitle" id="subtitle"></p>
</header>

<div class="container">

  <!-- CAPS -->
  <div class="caps-panel" id="capsPanel">
    <div class="caps-header" id="capsHeader">
      <div style="display:flex;align-items:center;gap:10px;"><span>⚡</span><span class="caps-title" id="capsTitle"></span></div>
      <span class="caps-chevron">▼</span>
    </div>
    <div class="caps-body" id="capsBody"></div>
  </div>

  <!-- TABS -->
  <div class="mode-tabs">
    <button class="mode-tab t-pdf"  id="tab-pdf"     data-mode="pdf">    📄 <span id="lbl-pdf"></span></button>

function t(key, ...args) {
  const lang = LANGS[currentLang] || {};
  let val = key.split('.').reduce((o,k)=>(o&&o[k]!==undefined?o[k]:undefined), lang);
  if (val === undefined) val = key.split('.').reduce((o,k)=>(o&&o[k]!==undefined?o[k]:undefined), BASE);
  if (val === undefined) return key;
  return typeof val === 'function' ? val(...args) : val;
}

(async function loadPdfWorker(){
  const src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const integrity='sha512-BbrZ76UNZq5BhH7LL7pn9A4TKQpQeNCHOo65/akfelcIBbcVvYWOFQKPXIrykE3qZxYjmDX573oa4Ywsc7rpTw==';
  try{
    const resp=await fetch(src,{integrity,mode:'cors',credentials:'omit'});
    const blob=await resp.blob();
    pdfjsLib.GlobalWorkerOptions.workerSrc=URL.createObjectURL(blob);
  }catch(e){
    pdfjsLib.GlobalWorkerOptions.workerSrc=src;
    console.warn('[Security] pdf.worker SRI check failed:',e);
  }
})();

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function safeHexColor(c){return /^#[0-9A-Fa-f]{6}$/.test(c)?c:'#000000';}
function sanitizeHtmlForIframe(html){
  // Whitelist approach: remove dangerous elements then dangerous attributes/protocols
  try{
    const doc=new DOMParser().parseFromString(html,'text/html');
    // Remove all potentially dangerous elements
    const DANGEROUS_TAGS='script,noscript,iframe,object,embed,applet,base,link,meta[http-equiv],form,input,button,textarea,select,style[src],svg,math';
    doc.querySelectorAll(DANGEROUS_TAGS).forEach(el=>el.remove());
    // Sanitize remaining attributes
    doc.querySelectorAll('*').forEach(el=>{
      Array.from(el.attributes).forEach(attr=>{
        const name=attr.name.toLowerCase();
        // Strip all event handlers
        if(name.startsWith('on')){el.removeAttribute(attr.name);return;}
        // Strip dangerous URI schemes
        if(name==='href'||name==='src'||name==='action'){
          const val=attr.value.replace(/[\s\u0000-\u001f]/g,'').toLowerCase();
          if(/^(javascript|vbscript|data):/.test(val)){el.removeAttribute(attr.name);}
        }
      });
    });
    return doc.documentElement.outerHTML;
  }catch(e){
    console.warn('[Security] HTML sanitization failed:',e);
    return '';
  }
}

function detectLang() {

function setMode(mode) {
  if(isProcessing) return;
  clearSensitiveData();
  if(_wmPdfJsDoc){_wmPdfJsDoc.destroy();_wmPdfJsDoc=null;}
  if(_cropPdfJsDoc){_cropPdfJsDoc.destroy();_cropPdfJsDoc=null;}
  if(_redactPdfJsDoc){_redactPdfJsDoc.destroy();_redactPdfJsDoc=null;}
  currentMode=mode; files=[]; pdfDoc=null; pdfJsDoc=null; pageStates=[];
  hide('successBanner'); hide('progressWrap');
  document.getElementById('pageEditor').classList.remove('visible');
  document.getElementById('ocrPanel').style.display='none';
  document.getElementById('ocrResult').textContent='';

  // Tab highlights
  Object.keys(MODE_COLOR).forEach(m=>{
    const tab=document.getElementById('tab-'+m);
    if(tab) tab.className='mode-tab'+(m===mode?' t-'+m:'');
  });

  // Dropzone class
  document.getElementById('dropzone').className='dropzone dz-'+mode;

  // Show/hide html editor
  document.getElementById('htmlEditorWrap').style.display = mode==='html'?'flex':'none';
  // Hide dropzone for html (no file needed)
  document.getElementById('dropzone').style.display = mode==='html'?'none':'block';

  // File input config
  const fi=document.getElementById('fileInput');
  const multiModes=['pdf','img','txt'];
  fi.multiple=multiModes.includes(mode);
  fi.accept=mode==='img'?'image/jpeg,image/png,image/webp,image/gif,image/bmp,.jpg,.jpeg,.png,.webp,.gif,.bmp'
    :mode==='txt'?'.txt,text/plain'
    :mode==='ocr'?'.pdf,.jpg,.jpeg,.png,image/jpeg,image/png,application/pdf'
    :'.pdf,application/pdf';

  // Reset filename
  const nm=document.getElementById('outputName');
  nm.dataset.userEdited='';
  nm.value=t('defaultName.'+mode);

  // Extension badge
  document.getElementById('extBadge').textContent='.pdf';

  applyUI();
  showPanels();
  render();
}

function showPanels() {
  const mode=currentMode, hasFiles=files.length>0;
  const show=(id,cond)=>document.getElementById(id).classList.toggle('visible',!!cond);
  show('imgOptions',      mode==='img'&&hasFiles);
  show('compressionPanel',mode==='pdf'&&hasFiles);
  show('txtPanel',        mode==='txt'&&hasFiles);
  show('htmlOptions',     mode==='html');
  show('wmPanel',         mode==='wm'&&hasFiles);
  if(mode==='wm') requestAnimationFrame(updateWmPreview);
  show('protectPanel',    mode==='protect'&&hasFiles);
  show('splitPanel',      mode==='split'&&hasFiles);
  show('cropPanel',       mode==='crop'&&hasFiles);
  show('redactPanel',     mode==='redact'&&hasFiles);
  show('ocrOptionsPanel', mode==='ocr'&&hasFiles);
  if(mode==='protect'&&hasFiles){renderEncAlgoUI();renderPepperUI();renderPermissionsUI();}
  if(mode==='crop'&&hasFiles){if(_cropPdfJsDoc){_cropPdfJsDoc.destroy();}_cropPdfJsDoc=null;_cropRect=null;_cropListenersAttached=false;_cropBusy=false;requestAnimationFrame(loadCropPage);}
  if(mode==='redact'&&hasFiles){if(_redactPdfJsDoc){_redactPdfJsDoc.destroy();}_redactPdfJsDoc=null;redactZones=[];_redactListenersAttached=false;_redactBusy=false;requestAnimationFrame(loadRedactPage);}
  if(mode==='txt'&&hasFiles) updateTxtPreview();
}

const MAX_FILE_SIZE = 500 * 1024 * 1024; // 500 Mo
function addFiles(newFiles) {
  if(isProcessing) return;
  // Reject oversized files
  const oversized = newFiles.filter(f=>f.size > MAX_FILE_SIZE);
  if(oversized.length){ alert(t('errorFileTooLarge', fmtSize(MAX_FILE_SIZE))); }
  // Reject empty files
  const empty = newFiles.filter(f=>f.size===0);
  if(empty.length){ alert(t('errorFileEmpty')); }
  newFiles = newFiles.filter(f=>f.size>0 && f.size<=MAX_FILE_SIZE);
  if(!newFiles.length) return;
  const large = newFiles.filter(f=>f.size>100*1024*1024);
  if(large.length){ alert(t('warnFileLarge', fmtSize(large[0].size))); }
  const m=currentMode;
  let valid, ignored;
  if(m==='img'){
    valid=newFiles.filter(f=>IMG_TYPES.includes(f.type)||/\.(jpe?g|png|webp|gif|bmp)$/i.test(f.name));
    ignored=newFiles.length-valid.length;
    if(ignored) alert(t('filesIgnoredImg',ignored));
    files.push(...valid);
  } else if(m==='txt'){
    valid=newFiles.filter(f=>f.type==='text/plain'||f.name.toLowerCase().endsWith('.txt'));
    ignored=newFiles.length-valid.length;
    if(ignored) alert(t('filesIgnoredTxt',ignored));
    files.push(...valid);
  } else if(m==='ocr'){
    valid=newFiles.filter(f=>f.type==='application/pdf'||IMG_TYPES.includes(f.type)||/\.(pdf|jpe?g|png)$/i.test(f.name));
    files=valid.slice(0,1);
  } else {
    valid=newFiles.filter(f=>f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf'));
    ignored=newFiles.length-valid.length;
    if(ignored) alert(t('filesIgnoredPdf',ignored));
    if(['pages','split','wm','protect','crop','redact'].includes(m)) files=valid.slice(0,1);
    else files.push(...valid);
  }
  if(m==='wm'){if(_wmPdfJsDoc){_wmPdfJsDoc.destroy();}_wmPdfJsDoc=null;}
  if(m==='crop'){if(_cropPdfJsDoc){_cropPdfJsDoc.destroy();}_cropPdfJsDoc=null;_cropRect=null;_cropListenersAttached=false;}
  if(m==='redact'){if(_redactPdfJsDoc){_redactPdfJsDoc.destroy();}_redactPdfJsDoc=null;redactZones=[];_redactListenersAttached=false;}
  showPanels();
  if(m==='pages'&&files.length===1) loadPagesMode(files[0]);
  if(m==='split'&&files.length===1) loadPagesMode(files[0]);
  render();
}

function fmtSize(bytes){const u=t('sizeUnits');if(bytes<1024)return bytes+' '+u.o;if(bytes<1048576)return Math.round(bytes/1024)+' '+u.ko;return(bytes/1048576).toFixed(1)+' '+u.mo;}
function getExt(name){return name.split('.').pop().toUpperCase().slice(0,4);}

let _renderKey='';
function render() {
  const list=document.getElementById('fileList');
  const mode=currentMode;
  const canDrag=(mode==='pdf'||mode==='img'||mode==='txt')&&files.length>1;

  if(mode==='html'){
    document.getElementById('optionsBar').style.display='flex';
    document.getElementById('infoRow').style.display='none';
    document.getElementById('dragHint').style.display='none';
    document.getElementById('actionBtn').disabled=false;
    return;
  }

  if(!files.length){
    document.getElementById('optionsBar').style.display='none';
    document.getElementById('infoRow').style.display='none';
    document.getElementById('dragHint').style.display='none';
    document.getElementById('actionBtn').disabled=true;
    return;
  }

  document.getElementById('optionsBar').style.display='flex';
  document.getElementById('infoRow').style.display='flex';
  document.getElementById('dragHint').style.display=canDrag?'block':'none';
  if(canDrag) document.getElementById('dragHint').textContent=t('dragHint');
  const minF={pdf:2,img:1,txt:1,pages:1,split:1,wm:1,protect:1,ocr:1};
  document.getElementById('actionBtn').disabled=files.length<(minF[mode]||1);

  const total=files.reduce((s,f)=>s+f.size,0);
  document.getElementById('fileCount').textContent=t('fileCount',files.length);
  document.getElementById('totalSize').textContent=t('totalSize',fmtSize(total));

  // Skip full DOM rebuild if file list identity hasn't changed
  const newKey=mode+'|'+files.map(f=>f.name+'#'+f.size+'#'+f.lastModified).join(',');
  if(newKey===_renderKey) return;
  _renderKey=newKey;
  list.innerHTML='';

  files.forEach((f,i)=>{
    const item=document.createElement('div');
    item.className='file-item';
    item.draggable=canDrag;
    let iconHtml, blobUrlToRevoke=null;
    if(mode==='img'&&IMG_TYPES.includes(f.type)){
      blobUrlToRevoke=URL.createObjectURL(f);
      iconHtml=`<div class="file-thumb-slot"></div>`;
    } else if(f.name.toLowerCase().endsWith('.txt')){
      iconHtml=`<div class="file-icon fi-txt">.TXT</div>`;
    } else if(f.name.toLowerCase().endsWith('.html')||f.name.toLowerCase().endsWith('.htm')){
      iconHtml=`<div class="file-icon fi-htm">HTML</div>`;
    } else {
      iconHtml=`<div class="pdf-preview-thumb" id="pthumb-${i}"><div style="font-size:.5rem;color:var(--muted)">PDF</div></div>`;
    }
    item.innerHTML=`
      <div class="order-badge">${i+1}</div>
      ${iconHtml}
      <div class="file-info">
        <div class="file-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</div>
        <div class="file-meta">${fmtSize(f.size)}</div>
      </div>
      ${canDrag?'<span class="file-handle">⠿</span>':''}
      <button class="file-remove" data-idx="${i}" title="${t('removeTitle')}">✕</button>`;
    if(canDrag){
      item.addEventListener('dragstart',e=>{dragSrcIndex=i;setTimeout(()=>item.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
      item.addEventListener('dragend',()=>item.classList.remove('dragging'));
      item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-target');});
      item.addEventListener('dragleave',()=>item.classList.remove('drag-target'));
      item.addEventListener('drop',e=>{e.preventDefault();item.classList.remove('drag-target');if(dragSrcIndex!==null&&dragSrcIndex!==i){const m=files.splice(dragSrcIndex,1)[0];files.splice(i,0,m);dragSrcIndex=null;render();}});
    }
    // Inject image via JS (avoids inline onload handler)
    if(blobUrlToRevoke){
      const slot=item.querySelector('.file-thumb-slot');
      const img=document.createElement('img');
      img.className='file-thumb';img.alt='';
      const cleanup=()=>URL.revokeObjectURL(blobUrlToRevoke);
      img.addEventListener('load',cleanup);
      img.addEventListener('error',cleanup);
      img.src=blobUrlToRevoke;
      if(slot)slot.replaceWith(img);
    }
    list.appendChild(item);
    if(f.name.toLowerCase().endsWith('.pdf')||f.type==='application/pdf') renderPdfThumb(f,i);
  });
}

async function renderPdfThumb(file,i){
  try{
    const bytes=await readAsBuffer(file);
    const doc=await pdfjsLib.getDocument({data:bytes}).promise;
    const page=await doc.getPage(1);
    const vp=page.getViewport({scale:.3});
    const canvas=document.createElement('canvas');
    canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    const wrap=document.getElementById(`pthumb-${i}`);
    if(wrap){wrap.innerHTML='';wrap.appendChild(canvas);}
  }catch(e){}
}

function updateTxtPreview(){
  const info=document.getElementById('txtPreviewInfo');
  if(!files.length){info.style.display='none';return;}
  const [pw,ph]=PAGE_SIZES[txtPageSz]||PAGE_SIZES.A4;
  const mg=TXT_MARGIN_PT[txtMarginSz];
  const fsPt=TXT_FONT_PT[txtFontSize];
  const lineH=fsPt*1.45;
  const usableH=ph-mg*2;
  const linesPerPage=Math.floor(usableH/lineH);
  const usableW=pw-mg*2;
  // Courier: width of char at size = size * 0.6 pts
  const charsPerLine=Math.floor(usableW/(fsPt*0.6));
  let totalPages=0;
  files.forEach(f=>{
    const estimatedLines=Math.ceil(f.size/Math.max(1,charsPerLine));
    totalPages+=Math.ceil(estimatedLines/Math.max(1,linesPerPage));
  });
  const fn=t('txtPreviewInfo');
  info.textContent=typeof fn==='function'?fn(files.length,Math.max(1,totalPages)):'';
  info.style.display='block';
}

// ══ Watermark live preview ══════════════════════════
let _wmPdfJsDoc=null, _wmPreviewBusy=false;

function debouncedUpdateWmPreview(){if(_wmPreviewTimer)clearTimeout(_wmPreviewTimer);_wmPreviewTimer=setTimeout(function(){updateWmPreview();_wmPreviewTimer=null;},200);}
async function updateWmPreview(){
  const canvas=document.getElementById('wmPreviewCanvas');
  const placeholder=document.getElementById('wmPreviewPlaceholder');
  const wrap=document.getElementById('wmPreviewWrap');
  if(!canvas||!wrap)return;

  const hasPdf=files.length>0&&currentMode==='wm';
  if(!hasPdf)_wmPdfJsDoc=null;

  // Container CSS width in real pixels
  const dpr=window.devicePixelRatio||1;
  const cssW=wrap.clientWidth||600;

  if(!hasPdf){
    // Blank A4 mockup — set canvas to A4 ratio at container width
    const ratio=PAGE_SIZES.A4[0]/PAGE_SIZES.A4[1]; // A4 width/height
    const cssH=Math.round(cssW/ratio);
    canvas.style.height=cssH+'px';
    canvas.width=Math.round(cssW*dpr);
    canvas.height=Math.round(cssH*dpr);
    const ctx=canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    // Draw page background
    ctx.fillStyle='#f9f9f9';ctx.fillRect(0,0,cssW,cssH);
    // Light line guides
    ctx.strokeStyle='#e8e8e8';ctx.lineWidth=1;
    const lineSpacing=cssH/30;
    const mx=cssW*0.08;
    for(let y=mx+lineSpacing;y<cssH-mx;y+=lineSpacing){
      ctx.beginPath();ctx.moveTo(mx,y);ctx.lineTo(cssW-mx,y);ctx.stroke();
    }
    placeholder.style.display='none';
    drawWmOverlay(ctx,cssW,cssH,dpr);
    return;
  }

  if(_wmPreviewBusy)return;
  _wmPreviewBusy=true;
  placeholder.style.display='none';
  try{
    if(!_wmPdfJsDoc){
      const bytes=await readAsBuffer(files[0]);
      _wmPdfJsDoc=await pdfJsLoadDoc(bytes);
    }
    const page=await _wmPdfJsDoc.getPage(1);
    // Scale so the rendered page fills the container width at device resolution
    const unscaledVp=page.getViewport({scale:1});
    const scale=(cssW*dpr)/unscaledVp.width;
    const vp=page.getViewport({scale});
    const cssH=Math.round(vp.height/dpr);

    canvas.width=Math.round(vp.width);
    canvas.height=Math.round(vp.height);
    canvas.style.height=cssH+'px';

    const ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    // Draw watermark overlay scaled to canvas physical pixels
    drawWmOverlay(ctx,vp.width,vp.height,dpr);
  }catch(e){placeholder.style.display='flex';}
  _wmPreviewBusy=false;
}

function drawWmOverlay(ctx,W,H,dpr=1){
  const text=document.getElementById('wmText')?.value||'WATERMARK';
  const opacity=parseInt(document.getElementById('wmOpacity')?.value||25)/100;
  const sizePt=parseInt(document.getElementById('wmSize')?.value||48);

  // sizePt is in PDF points (1pt = 1/72 inch).
  // The canvas represents a PDF page: W physical pixels = A4 width PDF points.
  // So 1 PDF pt = W/A4_W physical pixels.
  const ptToPx=W/PAGE_SIZES.A4[0];
  const sizePx=Math.round(sizePt*ptToPx);

  // Positions mirror applyWatermark exactly
  let x,y,rot=0;
  if(wmPos==='diagonal'){x=W*0.1;y=H*0.5;rot=35*Math.PI/180;}
  else if(wmPos==='center'){x=W/2;y=H/2;}
  else if(wmPos==='topLeft'){x=W*0.05;y=H*0.08;}
  else{x=W*0.95;y=H*0.95;}

  ctx.save();
  ctx.globalAlpha=opacity;
  ctx.font=`bold ${sizePx}px Arial,sans-serif`;
  ctx.fillStyle=wmColor;
  if(wmColor==='#ffffff'){ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=Math.round(4*dpr);}
  ctx.textBaseline='middle';
  ctx.textAlign=wmPos==='bottomRight'?'right':wmPos==='center'?'center':'left';
  ctx.translate(x,y);
  if(rot)ctx.rotate(rot);
  ctx.fillText(text,0,0);
  ctx.restore();
}

function _getSupportedAlgos(algos){
  // Detect at runtime which algorithms the loaded pdf-lib build actually supports
  const encEnum=PDFLib.EncryptionAlgorithm;
  if(!encEnum) return Object.keys(algos).filter(k=>k==='aes-128'); // fallback: only AES-128 known to be default
  return Object.keys(algos);
}

function generatePepper(){
  // 64 chars exactly (power of 2) → b & 63 has zero modulo bias
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*-_';
  const arr=new Uint8Array(16);crypto.getRandomValues(arr);
  autoPepperVal=Array.from(arr).map(b=>chars[b&63]).join('');
  document.getElementById('pepperAutoVal').value=autoPepperVal;
  updatePepperPreview();
}

async function loadPagesMode(file){
  try{
    const bytes=await readAsBuffer(file);
    const {PDFDocument}=PDFLib;
    pdfDoc=await PDFDocument.load(bytes).catch(()=>{throw new Error(t('errorProtected',file.name));});
    const n=pdfDoc.getPageCount();
    pageStates=Array.from({length:n},(_,i)=>({rotation:0,selected:false,originalIndex:i}));
    pdfJsDoc=await pdfjsLib.getDocument({data:bytes}).promise;
    document.getElementById('pageEditorTitle').textContent=t('pageEditorTitle',n);
    document.getElementById('pageEditor').classList.add('visible');
    renderPageEditor();
  }catch(err){alert(t('errorMsg',err.message));}
}
function renderPageEditor(){
  const grid=document.getElementById('pagesGrid');
  grid.innerHTML='';
  document.getElementById('pageEditorTitle').textContent=t('pageEditorTitle',pageStates.length);
  pageStates.forEach((ps,i)=>{
    const card=document.createElement('div');
    card.className='page-card'+(ps.selected?' selected':'');
    card.draggable=true;
    card.innerHTML=[
      '<div class="page-canvas-wrap" id="pcw-'+i+'">',
        '<div style="font-size:.6rem;color:var(--muted)">...</div>',
      '</div>',
      '<div class="page-footer">',
        '<span class="page-num">'+(i+1)+'</span>',
        '<button class="page-rotate-btn">&#8635;</button>',
      '</div>',
      '<div class="page-selected-badge">&#10003;</div>'
    ].join('');
    // IIFE to capture index correctly in closures
    (function(idx){
      card.addEventListener('click', function(){ togglePageSelect(idx); });
      card.addEventListener('dblclick', function(){ previewPage(idx); });
      card.querySelector('.page-rotate-btn').addEventListener('click',function(e){e.stopPropagation();rotatePage(idx,90);});
      card.addEventListener('dragstart', function(e){
        pageDragSrc = idx;
        setTimeout(function(){ card.classList.add('page-dragging'); }, 0);
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', function(){
        card.classList.remove('page-dragging');
      });
      card.addEventListener('dragover', function(e){
        e.preventDefault();
        if(_lastDragOverCard !== card){
          if(_lastDragOverCard) _lastDragOverCard.classList.remove('page-drag-over');
          card.classList.add('page-drag-over');
          _lastDragOverCard = card;
        }
      });
      card.addEventListener('dragleave', function(){
        if(_lastDragOverCard === card){
          card.classList.remove('page-drag-over');
          _lastDragOverCard = null;
        }
      });
      card.addEventListener('drop', function(e){
        e.preventDefault();
        card.classList.remove('page-drag-over');
        if(pageDragSrc !== null && pageDragSrc !== idx){
          var moved = pageStates.splice(pageDragSrc, 1)[0];
          pageStates.splice(idx, 0, moved);
          pageDragSrc = null;
          renderPageEditor();
        }
      });
    })(i);
    grid.appendChild(card);
    renderPageCard(i);
  });
}
async function renderPageCard(i){
  if(!pdfJsDoc) return;
  try{
    // Use originalIndex so the correct page image renders regardless of reorder position
    const srcPage = (pageStates[i].originalIndex !== undefined ? pageStates[i].originalIndex : i) + 1;
    const page = await pdfJsDoc.getPage(srcPage);
    const vp = page.getViewport({scale: 0.5, rotation: pageStates[i].rotation});
    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
    const wrap = document.getElementById('pcw-'+i);
    if(wrap){ wrap.innerHTML=''; wrap.appendChild(canvas); }
  }catch(e){}
}
function togglePageSelect(i){
  pageStates[i].selected=!pageStates[i].selected;
  const cards=document.querySelectorAll('.page-card');
  if(cards[i]){cards[i].classList.toggle('selected',pageStates[i].selected);const b=cards[i].querySelector('.page-selected-badge');if(b)b.style.display=pageStates[i].selected?'flex':'none';}
}
function selectAllPages(){pageStates.forEach((_,i)=>{pageStates[i].selected=true;});renderPageEditor();}
function selectNonePages(){pageStates.forEach((_,i)=>{pageStates[i].selected=false;});renderPageEditor();}
function rotatePage(i,deg){pageStates[i].rotation=((pageStates[i].rotation+deg)%360+360)%360;renderPageCard(i);}
function rotateSelected(deg){pageStates.forEach((_,i)=>{if(pageStates[i].selected)rotatePage(i,deg);});}
function deleteSelected(){
  const sel=pageStates.filter(ps=>ps.selected);
  if(!sel.length){alert(t('errorNoPages'));return;}
  if(sel.length===pageStates.length){alert(t('errorDeleteAllPages'));return;}
  pageStates=pageStates.filter(ps=>!ps.selected);renderPageEditor();
}
async function previewPage(i){
  if(!pdfJsDoc)return;
  const page=await pdfJsDoc.getPage(i+1);
  const vp=page.getViewport({scale:1.5,rotation:pageStates[i].rotation});

async function mergePDFs(){

    for(let i=0;i<files.length;i++){

// IMAGES → PDF
// ═══════════════════════════════════════════
async function convertImagesToPDF(){
  show('progressWrap');setProgress(0,t('progressInit'));
  try{
    const {PDFDocument}=PDFLib;const pdf=await PDFDocument.create();
    for(let i=0;i<files.length;i++){
      setProgress(Math.round((i/files.length)*90),t('progressConvert',files[i].name));
      const f=files[i];const bytes=await readAsBuffer(f);
      let img;
      if(f.type==='image/png'||f.name.toLowerCase().endsWith('.png'))img=await pdf.embedPng(bytes);
      else{const bu=URL.createObjectURL(new Blob([bytes],{type:f.type}));const jb=await imgToJpeg(bu);URL.revokeObjectURL(bu);img=await pdf.embedJpg(jb);}
      const{width:iw,height:ih}=img;
      let pw,ph;
      if(imgPageSize==='Auto'){pw=iw;ph=ih;}else{[pw,ph]=ih>iw?PAGE_SIZES[imgPageSize]:[PAGE_SIZES[imgPageSize][1],PAGE_SIZES[imgPageSize][0]];}
      const page=pdf.addPage([pw,ph]);const mg=imgPageSize==='Auto'?0:20,mxW=pw-mg*2,mxH=ph-mg*2;
      const ratio=iw/ih;let dW,dH;
      if(imgFit==='cover'){if(mxW/mxH>ratio){dW=mxW;dH=mxW/ratio;}else{dH=mxH;dW=mxH*ratio;}}
      else{if(mxW/mxH>ratio){dH=mxH;dW=mxH*ratio;}else{dW=mxW;dH=mxW/ratio;}}
      page.drawImage(img,{x:mg+(mxW-dW)/2,y:mg+(mxH-dH)/2,width:dW,height:dH});
    }
    setProgress(96,t('progressGen'));
    const name=getOutName('defaultName.img');triggerDl(await pdf.save(),name);
    done(t('successImg',name,files.length));
  }catch(err){fail(err);}
}

// ═══════════════════════════════════════════
// TXT → PDF  (fixed)
// ═══════════════════════════════════════════
async function convertTxtToPDF(){
  show('progressWrap');setProgress(0,t('progressInit'));
  try{
    const {PDFDocument,StandardFonts,rgb}=PDFLib;
    const pdf=await PDFDocument.create();
    const font=await pdf.embedFont(StandardFonts.Courier);
    const [pageW,pageH]=PAGE_SIZES[txtPageSz]||PAGE_SIZES.A4;
    const mg=TXT_MARGIN_PT[txtMarginSz];
    const fsPt=TXT_FONT_PT[txtFontSize];
    const lineH=fsPt*1.45;
    const usableW=pageW-mg*2;
    const usableH=pageH-mg*2;
    // Use pdf-lib's accurate glyph width measurement
    const charW=font.widthOfTextAtSize('M',fsPt); // Courier is monospace, all chars same width
    const charsPerLine=Math.max(1,Math.floor(usableW/charW));
    const linesPerPage=Math.max(1,Math.floor(usableH/lineH));

    for(let fi=0;fi<files.length;fi++){
      setProgress(Math.round((fi/files.length)*90),t('progressTxt',files[fi].name));
      const raw=await readAsText(files[fi]);
      // Normalize CRLF / CR
      const rawLines=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');

      // Word-wrap each raw line
      const wrapped=[];
      for(const rawLine of rawLines){
        if(!rawLine){wrapped.push('');continue;}
        let pos=0;
        while(pos<rawLine.length){
          let end=pos+charsPerLine;
          if(end>=rawLine.length){wrapped.push(rawLine.slice(pos));break;}
          // Try break on space
          let brk=rawLine.lastIndexOf(' ',end);
          if(brk<=pos) brk=end; // no space found, hard break
          wrapped.push(rawLine.slice(pos,brk));
          pos=brk+(rawLine[brk]===' '?1:0);
        }
      }

      // Paginate and draw
      let page=null,y=0,lineCount=0;
      const newPage=()=>{page=pdf.addPage([pageW,pageH]);y=pageH-mg-fsPt;lineCount=0;};
      newPage();
      for(const line of wrapped){
        if(lineCount>=linesPerPage){newPage();}
        if(line){
          // Strip chars outside WinAnsi (Courier encoding)
          const safe=line.replace(/[^\x20-\x7E\xA0-\xFF]/g,'?');
          try{
            page.drawText(safe,{x:mg,y,size:fsPt,font,color:rgb(0.05,0.05,0.05)});
          }catch(e){
            // Fallback: draw char by char, skip bad ones
          }
        }
        y-=lineH;lineCount++;
      }
    }
    setProgress(96,t('progressGen'));
    const name=getOutName('defaultName.txt');triggerDl(await pdf.save(),name);
    done(t('successTxt',name,files.length));
  }catch(err){fail(err);}
}

// ═══════════════════════════════════════════
// HTML → PDF
// ═══════════════════════════════════════════
async function convertHtmlToPDF(){
  const html=document.getElementById('htmlEditor').value.trim();
  if(!html){alert(t('errorNoHtml'));return;}
  show('progressWrap');setProgress(0,t('progressHtml'));
  try{
    const {PDFDocument}=PDFLib;
    const pdf=await PDFDocument.create();
    const [pageW,pageH]=PAGE_SIZES[htmlPageSz]||PAGE_SIZES.A4;
    const mgPt=TXT_MARGIN_PT[htmlMarginSz];
    // Render HTML in hidden iframe → canvas capture per "page"
    const iframe=document.createElement('iframe');
    iframe.style.cssText='position:fixed;left:-9999px;top:0;width:'+(pageW*1.33)+'px;height:'+(pageH*1.33)+'px;border:none;';
    iframe.sandbox='allow-same-origin';
    document.body.appendChild(iframe);
    await new Promise(res=>{
      iframe.addEventListener('load',res,{once:true});
      iframe.srcdoc=sanitizeHtmlForIframe(html);
    });
    await new Promise(r=>setTimeout(r,300)); // let styles apply
    setProgress(30,t('progressGen'));
    const iDoc=iframe.contentDocument;
    const totalH=iDoc.body.scrollHeight;
    const pageHpx=pageH*1.33;
    const pageCount=Math.max(1,Math.ceil(totalH/pageHpx));
    for(let p=0;p<pageCount;p++){
      setProgress(30+Math.round((p/pageCount)*60),`Page ${p+1}/${pageCount}…`);
      iframe.contentWindow.scrollTo(0,p*pageHpx);
      await new Promise(r=>setTimeout(r,80));
      // Use html2canvas approach via canvas
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(pageW*1.33);canvas.height=Math.round(pageHpx);
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
      // Draw iframe content via drawWindow if available (Firefox), else fallback
      if(ctx.drawWindow){
        ctx.drawWindow(iframe.contentWindow,0,p*pageHpx,canvas.width,pageHpx,'#fff');
      } else {
        // Fallback: render as white page with text note
        ctx.fillStyle='#555';ctx.font='14px sans-serif';
        ctx.fillText(typeof t('htmlFallbackPage')==='function'?t('htmlFallbackPage')(p+1):t('htmlFallbackPage'),20,30);
      }
      const jpegData=canvas.toDataURL('image/jpeg',0.9);
      const base64=jpegData.split(',')[1];
      const imgBytes=Uint8Array.from(atob(base64),c=>c.charCodeAt(0));
      const img=await pdf.embedJpg(imgBytes);
      const pg=pdf.addPage([pageW,pageH]);
      pg.drawImage(img,{x:0,y:0,width:pageW,height:pageH});
    }
    document.body.removeChild(iframe);
    setProgress(96,t('progressDl'));
    const name=getOutName('defaultName.html');triggerDl(await pdf.save(),name);
    done(t('successHtml',name));
  }catch(err){fail(err);}
}

// ═══════════════════════════════════════════
// SPLIT PDF
// ═══════════════════════════════════════════
async function splitPDF(){
  if(!files.length)return;
  show('progressWrap');setProgress(0,t('progressInit'));
  try{
    const {PDFDocument}=PDFLib;
    const bytes=await readAsBuffer(files[0]);
    const src=await PDFDocument.load(bytes).catch(()=>{throw new Error(t('errorProtected',files[0].name));});
    const totalPages=src.getPageCount();
    const baseName=getOutName('defaultName.split').replace('.pdf','');
    let parts=[];

    if(splitMode==='each'){
      parts=Array.from({length:totalPages},(_,i)=>([i]));
    } else if(splitMode==='everyN'){
      const n=Math.max(1,parseInt(document.getElementById('splitEveryN').value)||1);
      for(let i=0;i<totalPages;i+=n) parts.push(Array.from({length:Math.min(n,totalPages-i)},(_,j)=>i+j));
    } else {
      // Parse range string
      const raw=document.getElementById('splitRanges').value;
      const segments=raw.split(',').map(s=>s.trim()).filter(Boolean);
      for(const seg of segments){
        const m=seg.match(/^(\d+)(?:-(\d+))?$/);
        if(!m){fail(new Error(t('errorMsg',`Invalid range: ${seg}`)));return;}
        const from=parseInt(m[1])-1,to=m[2]?parseInt(m[2])-1:from;
        const indices=[];for(let i=from;i<=Math.min(to,totalPages-1);i++)indices.push(i);
        if(indices.length) parts.push(indices);
      }
    }

    for(let p=0;p<parts.length;p++){
      setProgress(Math.round((p/parts.length)*90),t('progressSplit',p+1,parts.length));
      const out=await PDFDocument.create();
      const copied=await out.copyPages(src,parts[p]);
      copied.forEach(pg=>out.addPage(pg));
      const suffix=parts.length>1?`_${p+1}`:'';
      triggerDl(await out.save(),`${baseName}${suffix}.pdf`);
      await new Promise(r=>setTimeout(r,150));
    }
    done(t('successSplit',parts.length));
  }catch(err){fail(err);}
}

// ═══════════════════════════════════════════
// EXPORT EDITED PAGES
// ═══════════════════════════════════════════
async function exportEditedPages(){
  if(!pdfDoc||!pageStates.length)return;
  show('progressWrap');setProgress(0,t('progressPages'));
  try{
    const {PDFDocument}=PDFLib;
    const out=await PDFDocument.create();
    // Use originalIndex to copy pages in the user-defined order
    const srcIndices=pageStates.map(ps=>Math.min(ps.originalIndex!==undefined?ps.originalIndex:0, pdfDoc.getPageCount()-1));
    const copied=await out.copyPages(pdfDoc, srcIndices);
    copied.forEach((p,i)=>{if(pageStates[i].rotation)p.setRotation(PDFLib.degrees(pageStates[i].rotation));out.addPage(p);});
    setProgress(96,t('progressDl'));
    const name=getOutName('defaultName.pages');triggerDl(await out.save(),name);
    done(t('successPages',name,pageStates.length));
  }catch(err){fail(err);}
}

async function protectPDF(){
  const pwd=document.getElementById('pwdInput').value;
  const pwd2=document.getElementById('pwdConfirm').value;
  if(!pwd){alert(t('errorPwdEmpty'));return;}
  if(pwd!==pwd2){alert(t('errorPwdMismatch'));return;}
  if(!files.length)return;
  const pepper=getPepperValue();
  const effectivePwd=pepper+pwd;
  show('progressWrap');setProgress(0,t('progressProtect'));
  try{
    const {PDFDocument}=PDFLib;
    const bytes=await readAsBuffer(files[0]);
    const pdf=await PDFDocument.load(bytes).catch(()=>{throw new Error(t('errorProtected',files[0].name));});
    setProgress(50,t('progressProtect'));
    const ownerRandom=Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
    // H2: pass chosen algorithm if the library exposes EncryptionAlgorithm enum
    const _encEnum=PDFLib.EncryptionAlgorithm;
    const _algoMap=_encEnum?{
      'aes-128':_encEnum.AES_128??_encEnum.aes128??_encEnum['aes-128'],
      'aes-256':_encEnum.AES_256??_encEnum.aes256??_encEnum['aes-256'],
    }:null;
    const _algoOpt=(_algoMap&&_algoMap[currentAlgo]!=null)?{encryptionAlgorithm:_algoMap[currentAlgo]}:{};
    pdf.encrypt({
      userPassword:effectivePwd,
      ownerPassword:effectivePwd+'_owner_'+ownerRandom,
      permissions:{printing:permissions.printing?'highResolution':'none',copying:permissions.copying,modifying:permissions.modifying,annotating:permissions.annotations,fillingForms:permissions.annotations},
      ..._algoOpt,
    });
    setProgress(90,t('progressDl'));
    const name=getOutName('defaultName.protect');triggerDl(await pdf.save(),name);
    // H7 + M7: effacement de toutes les données sensibles après chiffrement
    document.getElementById('pwdInput').value='';
    document.getElementById('pwdConfirm').value='';
    document.getElementById('pwdStrengthWrap').style.display='none';
    const pm=document.getElementById('pepperManual');if(pm) pm.value='';
    autoPepperVal='';generatePepper();updatePepperPreview();
    done(t('successProtect',name));
  }catch(err){fail(err);}
}

// OCR
// ═══════════════════════════════════════════
async function runOCR(){
  if(!files.length)return;
  show('progressWrap');setProgress(0,t('progressTesseract'));
  document.getElementById('ocrPanel').style.display='none';
  try{
    // Dynamically load Tesseract if not already loaded
    if(!window.Tesseract){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js','sha512-2wYKf5SRmHOMuTUmSsOkTTwejJrRcL6oHK5zHw/8MPUwZgTEekmapU6UOkxs0KFy20eWWmCiL30fZoVrtRkcPQ==');
    }
    const file=files[0];
    const isPdf=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
    const langs=ocrLangs.size>0?[...ocrLangs].join('+'):'eng';
    let fullText='';

    if(!isPdf){
      // Direct image OCR
      setProgress(20,t('progressOcr',1));
      const worker=await Tesseract.createWorker(langs,1,{logger:m=>{if(m.status==='recognizing text')setProgress(20+Math.round(m.progress*70),t('progressOcr',1));}});
      const url=URL.createObjectURL(file);
      const {data:{text}}=await worker.recognize(url);
      URL.revokeObjectURL(url);
      await worker.terminate();
      fullText=text;
    } else {
      // PDF: render each page as image, then OCR
      const bytes=await readAsBuffer(file);
      const jsDoc=await pdfJsLoadDoc(bytes);
      const n=jsDoc.numPages;
      const worker=await Tesseract.createWorker(langs);
      for(let i=1;i<=n;i++){
        setProgress(Math.round((i-1)/n*90),t('progressOcr',`${i}/${n}`));
        const page=await jsDoc.getPage(i);
        const vp=page.getViewport({scale:2});
        const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
        await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
        const url=canvas.toDataURL('image/png');
        const {data:{text}}=await worker.recognize(url);
        fullText+=`--- Page ${i} ---\n${text}\n\n`;
      }
      await worker.terminate();
    }

    setProgress(100,t('progressDl'));
    ocrText=fullText.trim();
    document.getElementById('ocrResult').textContent=ocrText||'(aucun texte détecté)';
    document.getElementById('ocrPanel').style.display='flex';
    setTimeout(()=>hide('progressWrap'),400);
    document.getElementById('successText').textContent=t('successOcr');
    show('successBanner');
  }catch(err){fail(err);}
}

// ── pdfjsLib loader with password support ──────────────
function pdfJsLoadDoc(bytes){
  return new Promise((res,rej)=>{
    let task;
    task=pdfjsLib.getDocument({
      data:bytes,
      onPassword:(updatePassword,reason)=>{
        const msg=reason===pdfjsLib.PasswordResponses.INCORRECT_PASSWORD
          ?t('errorPasswordWrong'):t('errorPasswordRequired');
        const pwd=prompt(msg);
        if(pwd===null){task.destroy();rej(new Error(t('errorCancelled')));}
        else updatePassword(pwd);
      }
    });
    task.promise.then(res).catch(rej);
  });
}

const _bufferCache=new WeakMap();
function readAsBuffer(file){
  if(_bufferCache.has(file))return Promise.resolve(_bufferCache.get(file));
  return new Promise((res,rej)=>{const r=new FileReader();r.addEventListener('load',e=>{const buf=new Uint8Array(e.target.result);_bufferCache.set(file,buf);res(buf);});r.addEventListener('error',()=>rej(new Error(t('errorRead'))));r.readAsArrayBuffer(file);});
}
function readAsText(file){return new Promise((res,rej)=>{const r=new FileReader();r.addEventListener('load',e=>res(e.target.result));r.addEventListener('error',()=>rej(new Error(t('errorRead'))));r.readAsText(file,'UTF-8');});}
function imgToJpeg(url){return new Promise((res,rej)=>{const img=new Image();img.addEventListener('load',()=>{const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);c.toBlob(b=>b.arrayBuffer().then(buf=>res(new Uint8Array(buf))).catch(rej),'image/jpeg',.92);});img.addEventListener('error',()=>rej(new Error('img load')));img.src=url;});}
function getOutName(key){
  const raw=document.getElementById('outputName').value.trim()||t(key);
  // Strip path-traversal chars and anything not suitable for a filename
  const sanitized=raw.replace(/[/\\:*?"<>|]/g,'_').replace(/\.{2,}/g,'_').slice(0,100);
  return (sanitized||'output')+'.pdf';
}
function triggerDl(bytes,name){const url=URL.createObjectURL(new Blob([bytes],{type:'application/pdf'}));const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);}
function setProgress(pct,label){document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressPct').textContent=pct+'%';document.getElementById('progressLabel').textContent=label;}
function show(id){document.getElementById(id).classList.add('visible');}
function hide(id){document.getElementById(id).classList.remove('visible');}
function done(msg){setTimeout(()=>{hide('progressWrap');document.getElementById('successText').textContent=msg;show('successBanner');},600);}
function fail(err){hide('progressWrap');alert(t('errorMsg',err.message||err));}

// CROP PDF
// ═══════════════════════════════════════════
// === CROP interactive state ===
let _cropRect   = null;  // {x,y,w,h} in canvas px (null = full page)
let _cropDrag   = null;  // drag state
let _cropSnap   = null;  // ImageData snapshot of rendered page
let _cropScale  = 1;     // canvas px per PDF pt
let _cropPageW  = PAGE_SIZES.A4[0];
let _cropPageH  = PAGE_SIZES.A4[1];
let _cropListenersAttached = false;
const CROP_HANDLE_SIZE = 10; // px

function renderCropApplyUI(){
  var modes = t('cropApplyModes') || {all:'Toutes les pages',single:'Page specifique'};
  var grp = document.getElementById('cropApplyGroup');

  });

function setCropApply(v){ cropApply=v; renderCropApplyUI(); loadCropPage(); }

function cropPrevPage(){
  var inp=document.getElementById('cropPageNum');
  if(inp) inp.value=Math.max(1,parseInt(inp.value||1)-1);
  loadCropPage();
}
function cropNextPage(){
  var inp=document.getElementById('cropPageNum');
  if(inp&&_cropPdfJsDoc) inp.value=Math.min(_cropPdfJsDoc.numPages,parseInt(inp.value||1)+1);
  loadCropPage();
}
function resetCropRect(){
  var canvas=document.getElementById('cropPreviewCanvas');
  if(!canvas) return;
  _cropRect={x:0,y:0,w:canvas.width,h:canvas.height};
  drawCropOverlay();
  updateCropCoords();
}

let _cropBusy = false;
async function loadCropPage(){
  var canvas=document.getElementById('cropPreviewCanvas');
  var wrap=document.getElementById('cropPreviewWrap');
  var ph=document.getElementById('cropPreviewPlaceholder');
  if(!canvas||!wrap) return;
  if(!files.length||currentMode!=='crop'){ if(ph)ph.style.display='flex'; return; }
  if(_cropBusy) return;
  _cropBusy=true;
  if(ph) ph.style.display='none';
  try{
    if(!_cropPdfJsDoc){
      var bytes=await readAsBuffer(files[0]);
      _cropPdfJsDoc=await pdfJsLoadDoc(bytes);
    }
    var totEl=document.getElementById('cropPageTotal');
    if(totEl) totEl.textContent='/ '+_cropPdfJsDoc.numPages;

    var pageNum=cropApply==='single'
      ? Math.max(1,Math.min(parseInt(document.getElementById('cropPageNum').value)||1,_cropPdfJsDoc.numPages))
      : 1;

    var dpr=window.devicePixelRatio||1;
    var cssW=wrap.clientWidth||600;
    var page=await _cropPdfJsDoc.getPage(pageNum);
    var uvp=page.getViewport({scale:1});
    var scale=(cssW*dpr)/uvp.width;
    var vp=page.getViewport({scale:scale});
    var cssH=Math.round(vp.height/dpr);

    canvas.width=Math.round(vp.width);
    canvas.height=Math.round(vp.height);
    canvas.style.height=cssH+'px';
    _cropScale=scale;
    _cropPageW=uvp.width;
    _cropPageH=uvp.height;

    var ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    _cropSnap=null; // release previous ImageData before capturing new one
    _cropSnap=ctx.getImageData(0,0,canvas.width,canvas.height);

    if(!_cropRect||_cropRect.w===0){
      _cropRect={x:0,y:0,w:canvas.width,h:canvas.height};
    }
    drawCropOverlay();
    updateCropCoords();
    if(!_cropListenersAttached){ setupCropDrawing(canvas); _cropListenersAttached=true; }
  }catch(e){ if(ph) ph.style.display='flex'; }
  _cropBusy=false;
}
// Backward compat alias
function updateCropPreview(){ loadCropPage(); }

function getCropHandles(){
  if(!_cropRect) return [];
  var r=_cropRect;
  return [
    {id:'nw',x:r.x,      y:r.y},
    {id:'n', x:r.x+r.w/2,y:r.y},
    {id:'ne',x:r.x+r.w,  y:r.y},
    {id:'e', x:r.x+r.w,  y:r.y+r.h/2},
    {id:'se',x:r.x+r.w,  y:r.y+r.h},
    {id:'s', x:r.x+r.w/2,y:r.y+r.h},
    {id:'sw',x:r.x,      y:r.y+r.h},
    {id:'w', x:r.x,      y:r.y+r.h/2}
  ];
}

function hitHandle(px,py){
  var dpr=window.devicePixelRatio||1;
  var hs=(CROP_HANDLE_SIZE+3)*dpr;
  var handles=getCropHandles();
  for(var i=0;i<handles.length;i++){
    if(Math.abs(px-handles[i].x)<hs && Math.abs(py-handles[i].y)<hs) return handles[i].id;
  }
  return null;
}

function insideCropRect(px,py){
  if(!_cropRect) return false;
  return px>=_cropRect.x && px<=_cropRect.x+_cropRect.w && py>=_cropRect.y && py<=_cropRect.y+_cropRect.h;
}

function drawCropOverlay(){
  var canvas=document.getElementById('cropPreviewCanvas');
  if(!canvas||!_cropSnap||!_cropRect) return;
  if(!_cropCtx||_cropCtx.canvas!==canvas) _cropCtx=canvas.getContext('2d');
  var ctx=_cropCtx;
  var dpr=window.devicePixelRatio||1;
  ctx.putImageData(_cropSnap,0,0);
  var x=_cropRect.x, y=_cropRect.y, w=_cropRect.w, h=_cropRect.h;
  var cW=canvas.width, cH=canvas.height;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.50)';
  ctx.fillRect(0,0,cW,y);
  ctx.fillRect(0,y+h,cW,cH-(y+h));
  ctx.fillRect(0,y,x,h);
  ctx.fillRect(x+w,y,cW-(x+w),h);
  ctx.restore();
  ctx.save();
  ctx.strokeStyle='#47d4ff';
  ctx.lineWidth=Math.round(2*dpr);
  ctx.setLineDash([Math.round(7*dpr),Math.round(3*dpr)]);
  ctx.strokeRect(x,y,w,h);
  ctx.setLineDash([]);
  var hs=CROP_HANDLE_SIZE*dpr;
  var handles=getCropHandles();
  ctx.fillStyle='#47d4ff';
  ctx.strokeStyle='#fff';
  ctx.lineWidth=Math.round(1.5*dpr);
  for(var i=0;i<handles.length;i++){
    ctx.fillRect(handles[i].x-hs/2,handles[i].y-hs/2,hs,hs);
    ctx.strokeRect(handles[i].x-hs/2,handles[i].y-hs/2,hs,hs);
  }
  ctx.restore();
}

function updateCropCoords(){
  if(!_cropRect) return;
  var ptX=Math.round(_cropRect.x/_cropScale);
  var ptH=Math.round(_cropRect.h/_cropScale);
  var ptY=Math.round(_cropPageH-(_cropRect.y+_cropRect.h)/_cropScale);
  var ptW=Math.round(_cropRect.w/_cropScale);
  var el=document.getElementById('cropCoordsVal');
  if(el) el.textContent='x:'+ptX+' y:'+ptY+' '+ptW+'\u00d7'+ptH+' pt';
  var row=document.getElementById('cropCoordsRow');
  if(row) row.style.display='flex';
}

function setupCropDrawing(canvas){
  var CURSOR_MAP={nw:'nw-resize',n:'n-resize',ne:'ne-resize',e:'e-resize',
                  se:'se-resize',s:'s-resize',sw:'sw-resize',w:'w-resize'};
  function getPos(e){
    var rect=canvas.getBoundingClientRect();
    var sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    var src=e.touches?e.touches[0]:e;
    return {cx:(src.clientX-rect.left)*sx, cy:(src.clientY-rect.top)*sy};
  }
  canvas.addEventListener('mousemove',function(e){
    if(!_cropDrag){
      var p=getPos(e);
      var hnd=hitHandle(p.cx,p.cy);
      canvas.style.cursor=hnd?CURSOR_MAP[hnd]:(insideCropRect(p.cx,p.cy)?'move':'crosshair');
      return;
    }
    var p=getPos(e);
    var dx=p.cx-_cropDrag.startX, dy=p.cy-_cropDrag.startY;
    var or=_cropDrag.origRect;
    var cW=canvas.width, cH=canvas.height;
    var nx=or.x,ny=or.y,nw=or.w,nh=or.h;
    var t=_cropDrag.type;
    if(t==='create'){
      nx=Math.min(_cropDrag.startX,p.cx); ny=Math.min(_cropDrag.startY,p.cy);
      nw=Math.abs(p.cx-_cropDrag.startX); nh=Math.abs(p.cy-_cropDrag.startY);
    } else if(t==='move'){
      nx=Math.max(0,Math.min(cW-or.w,or.x+dx));
      ny=Math.max(0,Math.min(cH-or.h,or.y+dy));
    } else {
      if(t.indexOf('n')>=0){ ny=Math.max(0,Math.min(or.y+or.h-10,or.y+dy)); nh=or.h-(ny-or.y); }
      if(t.indexOf('s')>=0){ nh=Math.max(10,Math.min(cH-or.y,or.h+dy)); }
      if(t.indexOf('w')>=0){ nx=Math.max(0,Math.min(or.x+or.w-10,or.x+dx)); nw=or.w-(nx-or.x); }
      if(t.indexOf('e')>=0){ nw=Math.max(10,Math.min(cW-or.x,or.w+dx)); }
    }
    _cropRect={x:nx,y:ny,w:nw,h:nh};
    drawCropOverlay();
    updateCropCoords();
  });
  canvas.addEventListener('mousedown',function(e){
    e.preventDefault();
    var p=getPos(e);
    var hnd=hitHandle(p.cx,p.cy);
    if(hnd){
      _cropDrag={type:hnd,startX:p.cx,startY:p.cy,origRect:Object.assign({},_cropRect)};
    } else if(insideCropRect(p.cx,p.cy)){
      _cropDrag={type:'move',startX:p.cx,startY:p.cy,origRect:Object.assign({},_cropRect)};
    } else {
      _cropDrag={type:'create',startX:p.cx,startY:p.cy,origRect:{x:p.cx,y:p.cy,w:0,h:0}};
      _cropRect={x:p.cx,y:p.cy,w:0,h:0};
    }
  });
  function finishDrag(){
    if(!_cropDrag) return;
    if(_cropRect&&_cropRect.w<5&&_cropRect.h<5){
      _cropRect={x:0,y:0,w:canvas.width,h:canvas.height};
      drawCropOverlay();
    }
    _cropDrag=null;
    updateCropCoords();
  }
  canvas.addEventListener('mouseup',finishDrag);
  canvas.addEventListener('mouseleave',function(){ if(_cropDrag) finishDrag(); });
  canvas.addEventListener('contextmenu',function(e){e.preventDefault();});
}

async function applyCrop(){
  if(!files.length) return;
  if(!_cropRect||(_cropRect.w<5&&_cropRect.h<5)){
    alert(t('errorNoCropZone'));return;
  }
  show('progressWrap'); setProgress(0, t('progressCrop')||'Rognage...');
  try{
    const {PDFDocument}=PDFLib;
    const bytes=await readAsBuffer(files[0]);
    const pdf=await PDFDocument.load(bytes).catch(()=>{throw new Error(t('errorProtected',files[0].name));});
    const pages=pdf.getPages();
    const single=cropApply==='single';
    const targetPage=single?Math.max(1,Math.min(parseInt(document.getElementById('cropPageNum').value)||1,pages.length))-1:-1;

    const ptX=_cropRect.x/_cropScale;
    const ptY=_cropPageH-(_cropRect.y+_cropRect.h)/_cropScale;
    const ptW=_cropRect.w/_cropScale;
    const ptH=_cropRect.h/_cropScale;

    pages.forEach(function(page,i){
      if(single&&i!==targetPage) return;
      const sz=page.getSize();
      const sx=sz.width/_cropPageW, sy=sz.height/_cropPageH;
      page.setCropBox(ptX*sx, ptY*sy, ptW*sx, ptH*sy);
    });

    setProgress(90, t('progressDl'));
    const name=getOutName('defaultName.crop');
    triggerDl(await pdf.save(), name);
    done(t('successCrop',name));
  }catch(err){ fail(err); }
}

const REDACT_COLORS = ['#000000','#1a1a1a','#003366','#8B0000','#2d2d2d'];

function renderRedactColorUI(){
  const grp = document.getElementById('redactColorGroup');
  if(!grp) return;
  grp.innerHTML = REDACT_COLORS.map(c=>
    `<div class="color-swatch${_redactColor===c?' active':''}" style="background:${c};border-color:${_redactColor===c?'#fff':'transparent'}"></div>`
  ).join('');
  grp.querySelectorAll('.color-swatch').forEach((el,i)=>{el.addEventListener('click',()=>setRedactColor(REDACT_COLORS[i]));});
}
function setRedactColor(c){ _redactColor=c; renderRedactColorUI(); redrawRedactCanvas(); }

let _redactCurrentPageBytes = null;

let _redactListenersAttached = false;
let _redactBusy = false;

async function loadRedactPage(){
  const canvas  = document.getElementById('redactCanvas');
  const wrap    = document.getElementById('redactCanvasWrap');
  const ph      = document.getElementById('redactPlaceholder');
  if(!canvas||!wrap||!files.length||currentMode!=='redact') return;
  if(_redactBusy) return;
  _redactBusy = true;
  ph.style.display='none';
  try{
    if(!_redactPdfJsDoc){
      const bytes = await readAsBuffer(files[0]);
      _redactPdfJsDoc = await pdfJsLoadDoc(bytes);
      const tot = document.getElementById('redactPageTotal');
      if(tot) tot.textContent = '/ '+_redactPdfJsDoc.numPages;
      const inp = document.getElementById('redactPageNum');
      if(inp) inp.max = _redactPdfJsDoc.numPages;
    }
    await redrawRedactCanvas();
    // Attach drawing listeners only once (not on every page change)
    if(!_redactListenersAttached){
      setupRedactDrawing(canvas);
      _redactListenersAttached = true;
    }
  }catch(e){ if(ph) ph.style.display='flex'; }
  _redactBusy = false;
}

async function redrawRedactCanvas(){
  const canvas = document.getElementById('redactCanvas');
  const wrap   = document.getElementById('redactCanvasWrap');
  if(!canvas||!wrap||!_redactPdfJsDoc) return;

  const pageNum = Math.max(1, Math.min(parseInt(document.getElementById('redactPageNum').value)||1, _redactPdfJsDoc.numPages));
  const dpr   = window.devicePixelRatio||1;
  const cssW  = wrap.clientWidth||600;
  const page  = await _redactPdfJsDoc.getPage(pageNum);
  const uvp   = page.getViewport({scale:1});
  const scale = (cssW*dpr)/uvp.width;
  const vp    = page.getViewport({scale});
  const cssH  = Math.round(vp.height/dpr);

  canvas.width  = Math.round(vp.width);
  canvas.height = Math.round(vp.height);
  canvas.style.height = cssH+'px';
  canvas._pdfScale = scale; // store for coord mapping
  canvas._pdfPage  = pageNum;
  canvas._pageW    = uvp.width;
  canvas._pageH    = uvp.height;

  const ctx = canvas.getContext('2d');
  await page.render({canvasContext:ctx, viewport:vp}).promise;

  // Draw existing zones for this page
  const zones = redactZones.filter(z=>z.page===pageNum);
  zones.forEach(z=>{
    const px = z.x * scale, py = (z.pageH - z.y - z.h) * scale;
    const pw = z.w * scale, ph2 = z.h * scale;
    ctx.fillStyle = z.color;
    ctx.fillRect(px, py, pw, ph2);
  });

  // Store a pixel snapshot so mousemove can restore it cheaply
  canvas._snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

  renderRedactZonesList();
}

function setupRedactDrawing(canvas){
  // Attach directly on the canvas element — no cloning needed.
  // Canvas metadata (_pdfScale etc.) is always kept up-to-date by redrawRedactCanvas.
  var getPos = function(e){
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var src = e.touches ? e.touches[0] : e;
    return {
      cx: (src.clientX - rect.left) * scaleX,
      cy: (src.clientY - rect.top)  * scaleY
    };
  };

  canvas.addEventListener('mousedown', function(e){
    e.preventDefault();
    var p = getPos(e);
    _redactDrawing = true;
    _redactStart = {cx: p.cx, cy: p.cy};
  });

  var _redactCtx = canvas.getContext('2d');
  canvas.addEventListener('mousemove', function(e){
    if(!_redactDrawing || !_redactStart) return;
    var p = getPos(e);
    var cx = p.cx, cy = p.cy;
    // Draw live preview rectangle on top of the last rendered state
    // We keep a snapshot to avoid calling the async redraw on every mousemove
    var ctx = _redactCtx;
    // Restore snapshot if available
    if(canvas._snapshot){
      ctx.putImageData(canvas._snapshot, 0, 0);
    }
    var x = Math.min(_redactStart.cx, cx), y = Math.min(_redactStart.cy, cy);
    var w = Math.abs(cx - _redactStart.cx), h = Math.abs(cy - _redactStart.cy);
    ctx.save();
    ctx.fillStyle = _redactColor + 'aa';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.strokeRect(x, y, w, h);
    ctx.restore();
  });

  canvas.addEventListener('mouseup', function(e){
    if(!_redactDrawing || !_redactStart) return;
    _redactDrawing = false;
    var p = getPos(e);
    var cx = p.cx, cy = p.cy;
    var x = Math.min(_redactStart.cx, cx), y = Math.min(_redactStart.cy, cy);
    var w = Math.abs(cx - _redactStart.cx), h = Math.abs(cy - _redactStart.cy);
    _redactStart = null;
    if(w < 5 || h < 5) return;
    // Convert canvas px -> PDF points using metadata set by redrawRedactCanvas
    var s    = canvas._pdfScale || 1;
    var pH   = canvas._pageH    || PAGE_SIZES.A4[1];
    var pNum = canvas._pdfPage  || 1;
    var rx   = x / s;
    var rh_  = h / s;
    var ry   = pH - (y / s) - rh_;
    redactZones.push({page: pNum, x: rx, y: ry, w: w/s, h: rh_, pageH: pH, color: _redactColor});
    redrawRedactCanvas(); // re-render to commit the new zone properly
  });

  // Prevent context menu on right-click
  canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });
}

function redactPrevPage(){
  const inp=document.getElementById('redactPageNum');
  if(!inp)return;
  inp.value=Math.max(1,parseInt(inp.value||1)-1);
  loadRedactPage();
}
function redactNextPage(){
  const inp=document.getElementById('redactPageNum');
  if(!inp||!_redactPdfJsDoc)return;
  inp.value=Math.min(_redactPdfJsDoc.numPages,parseInt(inp.value||1)+1);
  loadRedactPage();
}

function renderRedactZonesList(){
  const list=document.getElementById('redactZonesList');
  if(!list)return;
  const pageNum=parseInt(document.getElementById('redactPageNum')?.value||1);
  const zones=redactZones.filter(z=>z.page===pageNum);
  if(!zones.length){list.innerHTML='';return;}
  let localNum=0;
  list.innerHTML=redactZones.map((z,globalIdx)=>{
    if(z.page!==pageNum) return '';
    localNum++;
    return `<div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.75rem;color:var(--muted);">
      <div style="width:12px;height:12px;border-radius:3px;background:${safeHexColor(z.color)};flex-shrink:0;"></div>
      <span>Zone ${localNum} — x:${Math.round(z.x)} y:${Math.round(z.y)} w:${Math.round(z.w)} h:${Math.round(z.h)} pt</span>
      <button data-idx="${globalIdx}" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--red);font-size:.85rem;">✕</button>
    </div>`;
  }).join('');
}
function removeRedactZone(i){redactZones.splice(i,1);redrawRedactCanvas();}
function clearRedactZones(){redactZones=[];redrawRedactCanvas();}

async function applyRedact(){
  if(!files.length)return;
  if(!redactZones.length){alert(t('errorNoRedactZones'));return;}
  if(!confirm(t('redactConfirmMsg')))return;
  show('progressWrap');setProgress(0,t('progressRedact')||'Censure…');
  try{
    const {PDFDocument, rgb} = PDFLib;
    const bytes = await readAsBuffer(files[0]);
    const pdf   = await PDFDocument.load(bytes).catch(()=>{throw new Error(t('errorProtected',files[0].name));});
    const pages = pdf.getPages();

    redactZones.forEach(z=>{
      const page = pages[z.page-1];
      if(!page)return;
      const hex=safeHexColor(z.color).slice(1);
      const r=parseInt(hex.slice(0,2),16)/255, g=parseInt(hex.slice(2,4),16)/255, b=parseInt(hex.slice(4,6),16)/255;
      page.drawRectangle({x:z.x, y:z.y, width:z.w, height:z.h, color:rgb(r,g,b), opacity:1});
    });

    setProgress(90, t('progressDl'));
    const name = getOutName('defaultName.redact');
    triggerDl(await pdf.save(), name);
    done(t('successRedact', name, redactZones.length));
  }catch(err){ fail(err); }
}
